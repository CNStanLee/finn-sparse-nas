# Data
data:
  input_file: ./data/processed-pythia82-lhc13-all-pt1-50k-r1_h022_e0175_t220_nonu_truth.z
  config_file: ./datasets/jsc_logicnets/yaml_IP_OP_config.yaml
  seed: 42
  val_frac: 0.1

# Task
task:
  name: jsc_mlp
  in_features: 16
  n_classes: 5

# Different training phases
train:
  quick: # NAS
    batch_size: 2048
    val_batch_size: 4096
    epochs: 16
    lr: 0.001
    weight_decay: 0.001
  full: # finalists
    batch_size: 2048
    val_batch_size: 4096
    epochs: 500
    lr: 0.001
    weight_decay: 0.001
    early_stop_patience: 50
    min_delta: 0.0001
    min_epochs: 50
  finetune: # post-pruning
    batch_size: 2048
    val_batch_size: 4096
    epochs: 25
    lr: 0.0003
    weight_decay: 0.001
    early_stop_patience: 10

# Optional post-hoc pruning for finalists
pruning:
  unstructured: [0.0, 0.3, 0.5, 0.7]
  structured: [1.0, 0.75, 0.5]
  baseline: [0.0]

# FINN build params
finn:
  max_retries: 5
  target_clk_mhz: 200
  target_fps: 1000
  board: Ultra96-V2
  shell_flow: VIVADO_ZYNQ
  tmp_root: work # all per-candidate outputs here

# Fitness from FINN report + accuracy
fitness:
  target_accuracy: 0.76
  weights:
    acc: 0.67
    lut: 0.17
    dsp: 0.00
    bram: 0.11
    latency: 0.05
  # Normalizers to keep terms ~O(1)
  norm:
    lut: 2000
    dsp: 1
    bram_18k: 8
    latency_ns: 100000

# EA search space
search:
  widths: [16, 24, 32, 48, 64, 96, 128, 160, 192, 256, 320]
  min_layers: 2
  max_layers: 6
  quant_space:
    weight_bits: [2, 3, 4, 8]
    act_bits:    [3, 4, 8]
    out_bits:    [3, 4, 7, 8]

# EA loop
ea:
  mode: single # single | pareto
  pop_size: 30
  generations: 20
  elitism: 1
  randoms: 4
  cxpb: 0.3
  mutpb: 0.9
  tournsize: 2
  root_path: results/nas
  pickle_path: search.pkl
  csv_out: search.csv
  cuda: true
  seed: 123
